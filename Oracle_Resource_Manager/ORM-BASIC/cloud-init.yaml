#cloud-config

package_update: true
package_upgrade: false

packages:
  - apache2
  - mysql-server
  - php
  - libapache2-mod-php
  - php-mysql
  - ufw

write_files:
  - path: /var/www/html/index.php
    owner: root:root
    permissions: '0644'
    content: |
      <!DOCTYPE html>
      <html lang="pt-BR">
      <head>
          <meta charset="UTF-8">
          <title>Servidor LAMP</title>
      </head>
      <body>
          <h1>Servidor provisionado com sucesso</h1>
          <p>Hostname da máquina:</p>
          <h2><?php echo gethostname(); ?></h2>
      </body>
      </html>

runcmd:
  # Firewall
  - [ufw, allow, "22"]
  - [ufw, allow, "80"]
  - [ufw, allow, "443"]
  - [ufw, allow, "3306"]
  - [ufw, --force, enable]

  # Apache
  - [a2enmod, rewrite]
  - [systemctl, enable, apache2]
  - [systemctl, start, apache2]

  # MySQL
  - [systemctl, enable, mysql]
  - [systemctl, start, mysql]

final_message: "Servidor LAMP provisionado com sucesso via cloud-init"
